<input type="text" oninput="check(event)">

<div>
    <h1>one</h1>
    <h1>two</h1>
    <h1>three</h1>
    <h1>four</h1>
    <h1>five</h1>
</div>

<script>
    var enteredText = ""
    var container = document.querySelector("div")
    var element = container.querySelectorAll("h1")
    console.log(element)

    function check(event) {
        enteredText = event.target.value.toUpperCase()

        for (i = 0; i < element.length; i++) {
            if (element[i].textContent.toUpperCase().indexOf(enteredText) < 0) //less then 0 va iruthuchuna display none
            {
                element[i].style.display = "none"
            }
            else{
                element[i].style.display="block"
            }
        }
    }
</script>
